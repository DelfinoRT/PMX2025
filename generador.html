<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Documentos Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 { margin-bottom: 32px; font-weight: 600; color: #0f172a; }

        #item-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .item-row {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            transition: transform 0.2s;
        }

        .item-row:hover { transform: translateY(-4px); }

        .item-row span {
            flex-grow: 1;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .item-row img {
            width: 80px;
            height: 60px;
            object-fit: contain;
            background: #f1f5f9;
            border-radius: 6px;
            margin: 0 16px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: var(--primary-hover); }

        /* Modal Styling */
        #modalForm {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #fff;
            padding: 32px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            position: relative;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .close-btn {
            position: absolute;
            top: 16px; right: 16px;
            cursor: pointer;
            font-size: 24px;
            color: #94a3b8;
        }

        form div { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #475569;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .submit-btn { width: 100%; margin-top: 10px; padding: 12px; }
    </style>
</head>
<body>

    <h2>Panel de Generación</h2>

    <div id="item-list"></div>

    <div id="modalForm">
        <div class="modal-content">
            <span id="closeModal" class="close-btn">&times;</span>
            <h3 id="formTitle" style="margin-top: 0;"></h3>
            <form id="detailsForm">
                <div id="dynamic-fields"></div>
                <input type="hidden" name="tipo" id="tipoDoc">
                <button type="submit" class="submit-btn" id="submitLabel">Generar Archivo</button>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
    /** * CENTRAL CONFIGURATION
     * To change format: update 'renderAs' to 'pdf' or 'jpg'
     */
    const ITEM_CONFIGS = {
        'Constancia': {
            label: 'Constancia PMX 2026',
            img: 'generador/item1.png',
            unit: 'mm',
            orientation: 'l',
            format: [297, 215], 
            renderAs: 'pdf', // <--- Output type
            fields: [
                { id: 'nombre', label: 'Nombre Completo', type: 'text', size: 28, x: 0.5, y: 0.57, align: 'center' },
                { id: 'socio', label: '# Socio', type: 'text', size: 22, x: 0.55, y: 0.64, align: 'center' }
            ]
        },
        'Credencial': {
            label: 'Credencial PMX 2026',
            img: 'generador/item3.png',
            unit: 'mm',
            orientation: 'p',
            format: [55, 85], 
            renderAs: 'jpg', // <--- Output type
            fields: [
                { id: 'nombre', label: 'Nombre', type: 'text', size: 10, x: 0.5, y: 0.70, align: 'center' },
                { id: 'socio', label: 'ID Socio', type: 'text', size: 8, x: 0.5, y: 0.80, align: 'center' }
            ]
        }
    };

    const itemList = document.getElementById('item-list');
    const modal = document.getElementById('modalForm');
    const dynamicFieldsContainer = document.getElementById('dynamic-fields');

    // 1. Initialize UI
    function initUI() {
        itemList.innerHTML = '';
        for (const [key, config] of Object.entries(ITEM_CONFIGS)) {
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `
                <span>${config.label}</span>
                <img src="${config.img}" alt="${key}">
                <button onclick="openForm('${key}')">CONFIGURAR</button>
            `;
            itemList.appendChild(div);
        }
    }

    // 2. Open Modal & Build Form
    function openForm(key) {
        const config = ITEM_CONFIGS[key];
        if (!config) return;

        document.getElementById('formTitle').textContent = config.label;
        document.getElementById('tipoDoc').value = key;
        document.getElementById('submitLabel').textContent = `Generar ${config.renderAs.toUpperCase()}`;
        
        dynamicFieldsContainer.innerHTML = '';
        config.fields.forEach(field => {
            const wrapper = document.createElement('div');
            wrapper.innerHTML = `
                <label>${field.label}</label>
                <input type="${field.type}" name="${field.id}" required>
            `;
            dynamicFieldsContainer.appendChild(wrapper);
        });

        modal.style.display = 'flex';
    }

    // Modal Closing
    document.getElementById('closeModal').onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

    // 3. Main Generation Logic
    document.getElementById('detailsForm').onsubmit = function(e) {
        e.preventDefault();
        const formData = Object.fromEntries(new FormData(this).entries());
        const config = ITEM_CONFIGS[formData.tipo];

        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.src = config.img;

        img.onload = function() {
            if (config.renderAs === 'jpg') {
                generateJPG(img, config, formData);
            } else {
                generatePDF(img, config, formData);
            }
            modal.style.display = 'none';
        };

        img.onerror = () => alert('Error: No se pudo cargar la imagen de fondo.');
    };

    /**
     * PDF Generation Function
     */
    function generatePDF(img, config, formData) {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
            orientation: config.orientation,
            unit: config.unit,
            format: config.format
        });

        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();

        pdf.addImage(img, 'PNG', 0, 0, pageWidth, pageHeight);

        config.fields.forEach(field => {
            pdf.setFontSize(field.size);
            const val = formData[field.id] || '';
            const xPos = pageWidth * field.x;
            const yPos = pageHeight * field.y;
            pdf.text(val, xPos, yPos, { align: field.align });
        });

        pdf.save(`${formData.tipo}_${formData.nombre || 'doc'}.pdf`);
    }

    /**
     * JPG Generation Function
     */
    function generateJPG(img, config, formData) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        // Quality multiplier (scales original image size for clarity)
        const scale = 3; 
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;

        // Draw Background
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        // Draw Text
        config.fields.forEach(field => {
            // Conversion factor: approximate PDF points to Canvas pixels
            const fontSize = field.size * scale * 1.35; 
            ctx.font = `600 ${fontSize}px Inter, sans-serif`;
            ctx.fillStyle = "#1e293b"; 
            ctx.textAlign = field.align === 'center' ? 'center' : (field.align || 'left');
            
            const xPos = canvas.width * field.x;
            const yPos = canvas.height * field.y;
            
            ctx.fillText(formData[field.id] || '', xPos, yPos);
        });

        // Download trigger
        const link = document.createElement('a');
        link.download = `${formData.tipo}_${formData.nombre || 'doc'}.jpg`;
        link.href = canvas.toDataURL('image/jpeg', 0.92);
        link.click();
    }

    initUI();
    </script>
</body>
</html>
