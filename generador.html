<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦜 PeriquitosMex - Generador de Documentos</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;500;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-logo">
            <a href="index.html">
                <img src="recursos/PMX-Logo.png" alt="Logo PeriquitosMex" class="logo">
            </a>
            <span class="navbar-brand">PeriquitosMex</span>
        </div>
        
        <!-- Mobile Menu Toggle -->
        <button class="menu-toggle" aria-label="Menú">
            <span></span>
            <span></span>
            <span></span>
        </button>
        
        <div class="navbar-menu">
            <button data-page="index.html"><span class="icon icon-bird"></span> Sobre Nosotros</button>
            <button data-page="familiapmx.html"><span class="icon icon-group"></span> Familia PMX</button>
            <button data-page="biblioteca.html"><span class="icon icon-book"></span> Biblioteca</button>
            <button data-page="contacto.html"><span class="icon icon-mail"></span> Contacto</button>
            <button data-page="mutacionesjuego.html"><span class="icon icon-dna"></span> Juego de Mutaciones</button>
            <button data-page="generador.html"><span class="icon icon-doc"></span> Generador</button>
        </div>
    </nav>

    <div class="generador-container">
        <h2><span class="icon icon-doc"></span> Panel de Generacion de Documentos</h2>
        <div id="item-list"></div>
    </div>

    <div id="modalForm">
        <div class="modal-content">
            <span id="closeModal" class="close-btn">&times;</span>
            <h3 id="formTitle"></h3>
            <form id="detailsForm">
                <div id="dynamic-fields"></div>
                <input type="hidden" name="tipo" id="tipoDoc">
                <button type="submit" class="submit-btn" id="submitLabel">Generar Archivo</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>Comunidad Ornitol&oacute;gica de PeriquitosMex A.C.</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
    /** * CENTRAL CONFIGURATION
     * To change format: update 'renderAs' to 'pdf' or 'jpg'
     */
    const ITEM_CONFIGS = {
        'Constancia': {
            label: 'Constancia PMX 2026',
            img: 'generador/item1.png',
            unit: 'mm',
            orientation: 'l',
            format: [297, 215], 
            renderAs: 'png',
            fields: [
                { id: 'nombre', label: 'Nombre Completo', type: 'text', size: 28, x: 0.5, y: 0.57, align: 'center' },
                { id: 'socio', label: '# Socio', type: 'text', size: 22, x: 0.55, y: 0.64, align: 'center' }
            ]
        },
        'Credencial': {
            label: 'Credencial PMX 2026',
            img: 'generador/item2.png',
            unit: 'mm',
            orientation: 'p',
            format: [55, 85], 
            renderAs: 'jpg',
            fields: [
                { id: 'nombre', label: 'Nombre', type: 'text', size: 35, x: 0.26, y: 0.51, align: 'center' },
                { id: 'socio', label: 'ID Socio', type: 'text', size: 40, x: 0.29, y: 0.59, align: 'center' }
            ]
        }
    };

    const itemList = document.getElementById('item-list');
    const modal = document.getElementById('modalForm');
    const dynamicFieldsContainer = document.getElementById('dynamic-fields');

    // 1. Initialize UI
    function initUI() {
        itemList.innerHTML = '';
        for (const [key, config] of Object.entries(ITEM_CONFIGS)) {
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `
                <span>${config.label}</span>
                <img src="${config.img}" alt="${key}">
                <button onclick="openForm('${key}')">CONFIGURAR</button>
            `;
            itemList.appendChild(div);
        }
    }

    // 2. Open Modal & Build Form
    function openForm(key) {
        const config = ITEM_CONFIGS[key];
        if (!config) return;

        document.getElementById('formTitle').textContent = config.label;
        document.getElementById('tipoDoc').value = key;
        document.getElementById('submitLabel').textContent = `Generar ${config.renderAs.toUpperCase()}`;
        
        dynamicFieldsContainer.innerHTML = '';
        config.fields.forEach(field => {
            const wrapper = document.createElement('div');
            wrapper.innerHTML = `
                <label>${field.label}</label>
                <input type="${field.type}" name="${field.id}" required>
            `;
            dynamicFieldsContainer.appendChild(wrapper);
        });

        modal.style.display = 'flex';
    }

    // Modal Closing
    document.getElementById('closeModal').onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

    // 3. Main Generation Logic
    document.getElementById('detailsForm').onsubmit = function(e) {
        e.preventDefault();
        const formData = Object.fromEntries(new FormData(this).entries());
        const config = ITEM_CONFIGS[formData.tipo];

        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.src = config.img;

        img.onload = function() {
            if (config.renderAs === 'jpg') {
                generateJPG(img, config, formData);
            } else {
                generatePDF(img, config, formData);
            }
            modal.style.display = 'none';
        };

        img.onerror = () => alert('Error: No se pudo cargar la imagen de fondo.');
    };

    /**
     * PDF Generation Function
     */
    function generatePDF(img, config, formData) {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
            orientation: config.orientation,
            unit: config.unit,
            format: config.format
        });

        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();

        pdf.addImage(img, 'PNG', 0, 0, pageWidth, pageHeight);

        config.fields.forEach(field => {
            pdf.setFontSize(field.size);
            const val = formData[field.id] || '';
            const xPos = pageWidth * field.x;
            const yPos = pageHeight * field.y;
            pdf.text(val, xPos, yPos, { align: field.align });
        });

        pdf.save(`${formData.tipo}_${formData.nombre || 'doc'}.pdf`);
    }

    /**
     * JPG Generation Function
     */
    function generateJPG(img, config, formData) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        // Quality multiplier (scales original image size for clarity)
        const scale = 3; 
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;

        // Draw Background
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        // Draw Text
        config.fields.forEach(field => {
            // Conversion factor: approximate PDF points to Canvas pixels
            const fontSize = field.size * scale * 1.35; 
            ctx.font = `600 ${fontSize}px Inter, sans-serif`;
            ctx.fillStyle = "#1e293b"; 
            ctx.textAlign = field.align === 'center' ? 'center' : (field.align || 'left');
            
            const xPos = canvas.width * field.x;
            const yPos = canvas.height * field.y;
            
            ctx.fillText(formData[field.id] || '', xPos, yPos);
        });

        // Download trigger
        const link = document.createElement('a');
        link.download = `${formData.tipo}_${formData.nombre || 'doc'}.jpg`;
        link.href = canvas.toDataURL('image/jpeg', 0.92);
        link.click();
    }

    initUI();
    </script>
    
    <script>
        // Mobile menu toggle
        document.addEventListener('DOMContentLoaded', function() {
            const menuToggle = document.querySelector('.menu-toggle');
            const menu = document.querySelector('.navbar-menu');
            
            if (menuToggle && menu) {
                menuToggle.addEventListener('click', function() {
                    menuToggle.classList.toggle('active');
                    menu.classList.toggle('open');
                });
            }

            // Navbar scroll effect
            const navbar = document.querySelector('.navbar');
            window.addEventListener('scroll', function() {
                if (window.scrollY > 50) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            });
        });
    </script>
</body>
</html>
